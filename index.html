<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>这个班就上到这了</title>
  <style>
    :root {
      --bg1: #f7efe1;
      --bg2: #f4d8b4;
      --card: rgba(255, 255, 255, 0.9);
      --ink: #2f1b14;
      --muted: #6c4f45;
      --accent: #b74a00;
      --line: #f0d8c6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 15%, rgba(255, 255, 255, 0.72), transparent 40%),
        radial-gradient(circle at 88% 84%, rgba(255, 255, 255, 0.55), transparent 35%),
        linear-gradient(130deg, var(--bg1), var(--bg2));
    }

    .card {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(115, 62, 26, 0.15);
      padding: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 2.8vw, 2.3rem);
    }

    .sub {
      margin: 18px 0 10px;
      color: var(--muted);
      font-size: 0.93rem;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid #f2dfd1;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .count-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
      margin-top: 14px;
      margin-bottom: 22px;
    }

    @media (min-width: 760px) {
      .count-grid { grid-template-columns: 1fr 1fr; }
    }

    .count-card {
      background: linear-gradient(160deg, #fff, #fff7ef);
      border: 1px solid #efc9ad;
      border-radius: 14px;
      padding: 18px 16px;
      box-shadow: 0 12px 24px rgba(138, 74, 34, 0.1);
    }

    .count-value {
      display: block;
      margin: 8px 0;
      width: fit-content;
      padding: 0;
      font-size: clamp(1.55rem, 4.6vw, 2.45rem);
      font-weight: 900;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      vertical-align: middle;
      letter-spacing: 0.4px;
    }

    .line-top,
    .line-bottom {
      margin: 0;
      font-size: clamp(1.06rem, 2.5vw, 1.24rem);
      line-height: 1.45;
      font-weight: 600;
      text-align: left;
    }

    .line-bottom {
      margin-top: 2px;
    }

    .note {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .panel {
      margin-top: 8px;
      background: #fffdf8;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .toggles {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 10px;
      color: #4e3128;
      font-size: 0.92rem;
    }

    .toggles label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .toggles input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .custom-form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin: 8px 0 12px;
    }

    @media (min-width: 760px) {
      .custom-form {
        grid-template-columns: 1.3fr 1fr 120px;
      }
    }

    input[type="text"],
    input[type="date"],
    button {
      width: 100%;
      border: 1px solid #f0c3a6;
      border-radius: 10px;
      padding: 9px 11px;
      font-size: 0.95rem;
      background: #fff;
      color: var(--ink);
    }

    input[type="text"]:focus,
    input[type="date"]:focus {
      outline: none;
      border-color: #f0881a;
      box-shadow: 0 0 0 4px rgba(240, 136, 26, 0.2);
    }

    button {
      cursor: pointer;
      border: none;
      color: #fff;
      background: linear-gradient(120deg, #b74a00, #f0881a);
      font-weight: 600;
    }

    .holiday-list {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 320px;
      overflow: auto;
      display: grid;
      gap: 6px;
    }

    .holiday-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid #f2dfd1;
      background: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.9rem;
    }

    .holiday-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .holiday-meta input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .holiday-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tag {
      color: #7f5a4d;
      font-size: 0.78rem;
      border: 1px solid #efdbc9;
      border-radius: 999px;
      padding: 1px 7px;
      flex: 0 0 auto;
    }

    .mini-btn {
      border: 1px solid #f0c3a6;
      background: #fff8f3;
      color: #8f3d12;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .muted {
      color: #8f6d62;
    }

    .footer {
      margin: 14px 0 0;
      font-size: 0.8rem;
      color: #826157;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>这个班就上到这了</h1>

    <section class="count-grid" aria-label="双倒计时">
      <article class="count-card" id="weekendCard">
        <p class="line-top">忍一忍，还有</p>
        <p class="count-value" id="weekendCountdown">-- 天 --:--:--</p>
        <p class="line-bottom">就周末了</p>
        <p class="note" id="weekendNote"></p>
      </article>

      <article class="count-card">
        <p class="line-top">没关系，还有</p>
        <p class="count-value" id="holidayCountdown">-- 天 --:--:--</p>
        <p class="line-bottom">就<span id="holidayName">下一次休息日</span>了</p>
        <p class="note" id="holidayNote"></p>
      </article>
    </section>
    <p class="sub">双倒计时：距周末 + 距下一个休息日。你可以决定是否计入 HKU 学校假期、是否显示周末倒计时，还可以新增自定义假期。</p>

    <section class="panel">
      <h2>假期候选设置（2025-2026）</h2>

      <div class="toggles">
        <label>
          <input id="includeSchoolHolidays" type="checkbox" checked />
          计入 HKU 学校假期
        </label>
        <label>
          <input id="includeWeekendCandidate" type="checkbox" checked />
          显示周末倒计时
        </label>
      </div>

      <form class="custom-form" id="customForm">
        <input id="customName" type="text" placeholder="自定义假期名称（例如：答辩结束）" required />
        <input id="customDate" type="date" required />
        <button type="submit">新增假期</button>
      </form>

      <ul class="holiday-list" id="holidayList"></ul>
      <p class="note muted">提示：假期条目勾选表示参与“下一次休息日”计算；周末开关仅控制是否显示周末倒计时。</p>
    </section>

    <p class="footer">时区：Asia/Hong_Kong（与 Asia/Shanghai 同为 UTC+8）。</p>
  </main>

  <script>
    const STORAGE_KEY = "work-countdown-state-v1";
    const HOLIDAYS = [
      { id: "h1", date: "2025-10-01", name: "国庆日", type: "公休假期", enabled: true, source: "preset" },
      { id: "h2", date: "2025-10-07", name: "中秋节翌日", type: "公休假期", enabled: true, source: "preset" },
      { id: "h3", date: "2025-10-29", name: "重阳节翌日", type: "公休假期", enabled: true, source: "preset" },
      { id: "h4", date: "2025-12-24", name: "平安夜", type: "学校假期", enabled: true, source: "preset" },
      { id: "h5", date: "2025-12-25", name: "圣诞节", type: "公休假期", enabled: true, source: "preset" },
      { id: "h6", date: "2025-12-26", name: "圣诞节后首个周日以外日", type: "公休假期", enabled: true, source: "preset" },
      { id: "h7", date: "2025-12-31", name: "除夕（下午）", type: "学校假期", enabled: true, source: "preset" },
      { id: "h8", date: "2026-01-01", name: "元旦", type: "公休假期", enabled: true, source: "preset" },
      { id: "h9", date: "2026-02-16", name: "农历年廿九（下午）", type: "学校假期", enabled: true, source: "preset" },
      { id: "h10", date: "2026-02-17", name: "农历年初一", type: "公休假期", enabled: true, source: "preset" },
      { id: "h11", date: "2026-02-18", name: "农历年初二", type: "公休假期", enabled: true, source: "preset" },
      { id: "h12", date: "2026-02-19", name: "农历年初三", type: "公休假期", enabled: true, source: "preset" },
      { id: "h13", date: "2026-03-16", name: "港大奠基日", type: "学校假期", enabled: true, source: "preset" },
      { id: "h14", date: "2026-04-03", name: "耶稣受难节", type: "公休假期", enabled: true, source: "preset" },
      { id: "h15", date: "2026-04-04", name: "耶稣受难节翌日", type: "公休假期", enabled: true, source: "preset" },
      { id: "h16", date: "2026-04-06", name: "清明节翌日", type: "公休假期", enabled: true, source: "preset" },
      { id: "h17", date: "2026-04-07", name: "复活节星期一翌日", type: "公休假期", enabled: true, source: "preset" },
      { id: "h18", date: "2026-05-01", name: "劳动节", type: "公休假期", enabled: true, source: "preset" },
      { id: "h19", date: "2026-05-25", name: "佛诞翌日", type: "公休假期", enabled: true, source: "preset" },
      { id: "h20", date: "2026-06-19", name: "端午节", type: "公休假期", enabled: true, source: "preset" },
      { id: "h21", date: "2026-07-01", name: "香港特别行政区成立纪念日", type: "公休假期", enabled: true, source: "preset" }
    ];

    const weekendCountdown = document.getElementById("weekendCountdown");
    const weekendNote = document.getElementById("weekendNote");
    const weekendCard = document.getElementById("weekendCard");
    const holidayName = document.getElementById("holidayName");
    const holidayCountdown = document.getElementById("holidayCountdown");
    const holidayNote = document.getElementById("holidayNote");
    const holidayList = document.getElementById("holidayList");
    const includeSchoolHolidays = document.getElementById("includeSchoolHolidays");
    const includeWeekendCandidate = document.getElementById("includeWeekendCandidate");
    const customForm = document.getElementById("customForm");
    const customName = document.getElementById("customName");
    const customDate = document.getElementById("customDate");

    function isValidHolidayItem(item) {
      return item
        && typeof item.id === "string"
        && typeof item.date === "string"
        && typeof item.name === "string"
        && typeof item.type === "string"
        && typeof item.enabled === "boolean"
        && typeof item.source === "string";
    }

    function saveState() {
      const payload = {
        includeSchoolHolidays: includeSchoolHolidays.checked,
        includeWeekendCandidate: includeWeekendCandidate.checked,
        holidays: HOLIDAYS.map((h) => ({
          id: h.id,
          date: h.date,
          name: h.name,
          type: h.type,
          enabled: h.enabled,
          source: h.source
        }))
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (_) {
        // Ignore storage errors (quota/privacy mode).
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return;

        if (typeof parsed.includeSchoolHolidays === "boolean") {
          includeSchoolHolidays.checked = parsed.includeSchoolHolidays;
        }
        if (typeof parsed.includeWeekendCandidate === "boolean") {
          includeWeekendCandidate.checked = parsed.includeWeekendCandidate;
        }

        if (Array.isArray(parsed.holidays)) {
          const cleaned = parsed.holidays
            .filter(isValidHolidayItem)
            .map((item) => ({
              id: item.id,
              date: item.date,
              name: item.name,
              type: item.type,
              enabled: item.enabled,
              source: item.source
            }));
          if (cleaned.length > 0) {
            HOLIDAYS.splice(0, HOLIDAYS.length, ...cleaned);
          }
        }
      } catch (_) {
        // Ignore broken JSON or blocked storage.
      }
    }

    function pad(v) { return String(v).padStart(2, "0"); }

    function parseHKT(dateString) {
      const [y, m, d] = dateString.split("-").map(Number);
      return new Date(Date.UTC(y, m - 1, d, -8, 0, 0));
    }

    function formatDiff(ms) {
      if (ms <= 0) return "0 天 00:00:00";
      let rest = ms;
      const days = Math.floor(rest / 86400000);
      rest -= days * 86400000;
      const hours = Math.floor(rest / 3600000);
      rest -= hours * 3600000;
      const minutes = Math.floor(rest / 60000);
      rest -= minutes * 60000;
      const seconds = Math.floor(rest / 1000);
      return `${days} 天 ${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
    }

    function formatDateYMD(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function getNextWeekendStart(now) {
      let addDays = (6 - now.getDay() + 7) % 7;
      const target = new Date(now);
      target.setHours(0, 0, 0, 0);
      if (addDays === 0 && now >= target) addDays = 7;
      target.setDate(target.getDate() + addDays);
      return target;
    }

    function getActiveHolidayCandidates(now) {
      return HOLIDAYS
        .filter((item) => item.enabled)
        .filter((item) => includeSchoolHolidays.checked || item.type !== "学校假期")
        .map((item) => ({ ...item, target: parseHKT(item.date) }))
        .filter((item) => item.target.getTime() >= now.getTime())
        .sort((a, b) => a.target - b.target);
    }

    function findNextBreak(now) {
      const holidayCandidates = getActiveHolidayCandidates(now);
      return holidayCandidates.length ? { ...holidayCandidates[0], kind: "holiday" } : null;
    }

    function renderHolidayList() {
      const sorted = [...HOLIDAYS].sort((a, b) => a.date.localeCompare(b.date));
      holidayList.innerHTML = sorted.map((item) => {
        const disabledBySwitch = item.type === "学校假期" && !includeSchoolHolidays.checked;
        const deleteBtn = item.source === "custom"
          ? `<button class="mini-btn" type="button" data-action="delete" data-id="${item.id}">删除</button>`
          : "";
        return `
          <li class="holiday-item">
            <div class="holiday-meta">
              <input type="checkbox" data-action="toggle" data-id="${item.id}" ${item.enabled ? "checked" : ""} />
              <span class="holiday-text">${item.date} - ${item.name}</span>
              <span class="tag">${item.type}${disabledBySwitch ? "（当前未计入）" : ""}</span>
            </div>
            <div>${deleteBtn}</div>
          </li>
        `;
      }).join("");
    }

    function updateCountdown() {
      const now = new Date();

      const weekendTarget = getNextWeekendStart(now);
      weekendCountdown.textContent = formatDiff(weekendTarget.getTime() - now.getTime());
      weekendNote.textContent = `目标：${formatDateYMD(weekendTarget)} 周六 00:00`;
      weekendCard.style.display = includeWeekendCandidate.checked ? "" : "none";

      const nextBreak = findNextBreak(now);
      if (!nextBreak) {
        holidayName.textContent = "下一次休息日";
        holidayCountdown.textContent = "-- 天 --:--:--";
        holidayNote.textContent = "可勾选更多预设，或新增自定义假期。";
        return;
      }

      holidayName.textContent = nextBreak.name;
      holidayCountdown.textContent = formatDiff(nextBreak.target.getTime() - now.getTime());
      holidayNote.textContent = `日期：${nextBreak.date}（${nextBreak.type}）`;
    }

    holidayList.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const action = target.getAttribute("data-action");
      const id = target.getAttribute("data-id");
      if (!action || !id) return;
      if (action !== "delete") return;

      const item = HOLIDAYS.find((h) => h.id === id);
      if (!item) return;

      if (action === "delete" && item.source === "custom") {
        const idx = HOLIDAYS.findIndex((h) => h.id === id);
        if (idx >= 0) HOLIDAYS.splice(idx, 1);
      }

      saveState();
      renderHolidayList();
      updateCountdown();
    });

    holidayList.addEventListener("change", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;
      if (target.getAttribute("data-action") !== "toggle") return;
      const id = target.getAttribute("data-id");
      const item = HOLIDAYS.find((h) => h.id === id);
      if (!item) return;
      item.enabled = target.checked;
      saveState();
      renderHolidayList();
      updateCountdown();
    });

    customForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = customName.value.trim();
      const date = customDate.value;
      if (!name || !date) return;

      HOLIDAYS.push({
        id: `c-${Date.now()}-${Math.floor(Math.random() * 10000)}`,
        date,
        name,
        type: "自定义",
        enabled: true,
        source: "custom"
      });

      customName.value = "";
      customDate.value = "";
      saveState();
      renderHolidayList();
      updateCountdown();
    });

    includeSchoolHolidays.addEventListener("change", () => {
      saveState();
      renderHolidayList();
      updateCountdown();
    });

    includeWeekendCandidate.addEventListener("change", () => {
      saveState();
      updateCountdown();
    });

    loadState();
    renderHolidayList();
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
